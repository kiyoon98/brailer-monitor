<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brailer YOLO Pipeline</title>
  <link rel="stylesheet" href="/static/detect.css" />
</head>
<body>
  <header class="header">
    <div>
      <h1>Brailer YOLO Pipeline</h1>
      <p class="subtitle">CVAT 1.1 → YOLO 학습 → 비디오 탐지</p>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>1. CVAT 데이터 Import</h2>
      <p class="hint">CVAT for video 1.1 (.zip 또는 annotations.xml)</p>
      <label class="file-label">Annotation 파일
        <input id="cvatZip" type="file" accept=".zip,.xml" />
      </label>
      <label class="file-label">원본 영상 (annotation에 이미지 없을 때 필수)
        <input id="cvatVideo" type="file" accept="video/*" />
      </label>
      <button id="importBtn" type="button">Import</button>
      <div id="importStatus" class="status"></div>
      <div id="importLabels" class="label-summary hidden"></div>
    </section>

    <section class="panel">
      <h2>2. YOLO 학습</h2>
      <div class="row">
        <label>Epochs <input id="epochs" type="number" value="50" min="1" /></label>
        <label>Batch <input id="batch" type="number" value="8" min="1" /></label>
      </div>
      <button id="trainBtn" type="button" disabled>학습 시작</button>
      <div id="trainProgressWrap" class="progress-wrap hidden">
        <div class="progress-bar"><div id="trainProgressBar" class="progress-fill"></div></div>
        <span id="trainProgressText" class="progress-text"></span>
      </div>
      <div id="trainStatus" class="status"></div>
    </section>

    <section class="panel">
      <h2>3. 비디오 탐지</h2>
      <p class="hint">파일명 예: JJR-102283_stream04_260201_040016.mp4 → 2026-02-01 04:00 시작</p>
      <label class="file-label">비디오 (여러 파일 선택 가능)
        <input id="detectVideo" type="file" accept="video/*" multiple />
      </label>
      <div class="row">
        <label>프레임 간격 <input id="frameStride" type="number" value="5" min="1" /></label>
        <label>Confidence <input id="confidence" type="number" value="0.35" min="0.05" max="1" step="0.05" /></label>
      </div>
      <div class="row detect-actions">
        <button id="detectBtn" type="button" disabled>탐지 시작</button>
        <button id="resetTimelineBtn" type="button" class="secondary">결과 초기화</button>
      </div>
      <div id="detectProgressWrap" class="progress-wrap hidden">
        <div class="progress-bar"><div id="detectProgressBar" class="progress-fill"></div></div>
        <span id="detectProgressText" class="progress-text"></span>
      </div>
      <div id="detectStatus" class="status"></div>
    </section>

    <section id="importFramePanel" class="panel full collapsible collapsed hidden">
      <button id="importFrameToggle" type="button" class="panel-toggle" aria-expanded="false">
        <span class="panel-toggle-title">Import된 프레임 <span id="importFrameCount" class="badge">0</span></span>
        <span id="importFrameToggleIcon" class="toggle-icon">▶</span>
      </button>
      <div id="importFrameBody" class="collapsible-body hidden">
        <div class="panel-head">
          <label class="split-filter">Split
            <select id="importFrameSplit">
              <option value="all">전체</option>
              <option value="train">train</option>
              <option value="val">val</option>
            </select>
          </label>
        </div>
        <div id="importFrameResults" class="frame-results"></div>
        <button id="importFrameMore" type="button" class="secondary hidden">더 보기</button>
      </div>
    </section>

    <section class="panel full">
      <h2>탐지 타임라인 <span id="frameCount" class="badge">0</span></h2>
      <div id="timelineSummary" class="timeline-summary"></div>
      <div id="timelineAxis" class="timeline-axis hidden">
        <div class="timeline-axis-labels">
          <span id="timelineRangeStart" class="timeline-axis-start"></span>
          <span id="timelineRangeEnd" class="timeline-axis-end"></span>
        </div>
        <div id="timelineRail" class="timeline-rail"></div>
      </div>
      <div id="frameResults" class="timeline-segment-list"></div>
      <button id="detectFrameMore" type="button" class="secondary hidden">더 보기</button>
    </section>
  </main>

  <div id="frameLightbox" class="frame-lightbox hidden" role="dialog" aria-modal="true" aria-label="프레임 확대 보기">
    <button id="frameLightboxClose" type="button" class="lightbox-close" aria-label="닫기">✕</button>
    <div class="lightbox-content">
      <img id="frameLightboxImg" alt="" />
      <div id="frameLightboxMeta" class="lightbox-meta"></div>
    </div>
  </div>

  <script src="/static/detect.js?v=15"></script>
</body>
</html>
